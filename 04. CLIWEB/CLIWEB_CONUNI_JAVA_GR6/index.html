<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Conversión - Grupo 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="login-container" class="container">
        <h2>Sistema de Conversión de Unidades</h2>
        <div class="card">
            <label>Usuario:</label>
            <input type="text" id="txtUsuario">
            <label>Contraseña:</label>
            <input type="password" id="txtPassword">
            <button onclick="login()">Ingresar</button>
        </div>
    </div>

    <!-- Pantalla del Conversor (Oculta al inicio) -->
    <div id="main-container" class="container" style="display: none;">
        <h2>Conversor de Temperatura</h2>
        <div class="card">
            <div class="row">
                <select id="cbOrigen">
                    <option value="Celsius">Celsius</option>
                    <option value="Fahrenheit">Fahrenheit</option>
                    <option value="Kelvin">Kelvin</option>
                </select>
                <span> ==> </span>
                <select id="cbDestino">
                    <option value="Fahrenheit">Fahrenheit</option>
                    <option value="Celsius">Celsius</option>
                    <option value="Kelvin">Kelvin</option>
                </select>
            </div>
            <input type="number" id="txtValor" placeholder="Ingresa el valor">
            <h3 id="lblResultado">Resultado: ...</h3>
            <div class="row">
                <button onclick="calcular()">Calcular</button>
                <button class="btn-alt" onclick="limpiar()">Limpiar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
